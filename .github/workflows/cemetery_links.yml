name: Cemetery Blog Link Writer

on:
  schedule:
    - cron: '15 14 * * 1'  # Every Monday 14:15 UTC = 7:15 AM PDT (UTC-7)
  workflow_dispatch:        # Also allows manual trigger from GitHub

jobs:
  write-links:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install gspread google-auth playwright
          playwright install chromium

      - name: Run cemetery link writer
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: |
          python "contentstudio_scheduler/Link Writer Content Studio/add_links_cemetery.py"
