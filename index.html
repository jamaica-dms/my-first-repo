<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cosmic Solar System</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      overflow: hidden;
      font-family: 'Courier New', monospace;
      width: 100vw;
      height: 100vh;
    }

    #canvas {
      position: absolute;
      top: 0; left: 0;
    }

    #title {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      color: #fff;
      font-size: 1.4rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      text-shadow: 0 0 20px #a78bfa, 0 0 40px #7c3aed;
      z-index: 10;
      pointer-events: none;
    }

    .planet-label {
      position: absolute;
      color: rgba(255,255,255,0.75);
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      pointer-events: none;
      text-shadow: 0 0 8px currentColor;
      transform: translate(-50%, 14px);
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div id="title">&#10022; Cosmic Solar System &#10022;</div>
  <canvas id="canvas"></canvas>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    let W = canvas.width = window.innerWidth;
    let H = canvas.height = window.innerHeight;
    let cx = W / 2, cy = H / 2;

    window.addEventListener('resize', () => {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
      cx = W / 2; cy = H / 2;
      buildStars();
    });

    // ── Stars ──────────────────────────────────────────────
    let stars = [];
    function buildStars() {
      stars = Array.from({ length: 300 }, () => ({
        x: Math.random() * W,
        y: Math.random() * H,
        r: Math.random() * 1.4 + 0.2,
        a: Math.random(),
        da: (Math.random() - 0.5) * 0.008
      }));
    }
    buildStars();

    // ── Planet data ────────────────────────────────────────
    const scale = Math.min(W, H) / 900;

    const planets = [
      { name: 'Mercury', orbit: 80,  radius: 4,  speed: 4.74,  color: '#b5b5b5', glow: '#d4d4d4', tilt: 7  },
      { name: 'Venus',   orbit: 120, radius: 7,  speed: 3.50,  color: '#e8cda0', glow: '#f5e6c8', tilt: 3  },
      { name: 'Earth',   orbit: 165, radius: 8,  speed: 2.98,  color: '#4fa3e0', glow: '#7ec8e3', tilt: 0  },
      { name: 'Mars',    orbit: 215, radius: 6,  speed: 2.41,  color: '#c1440e', glow: '#e05c28', tilt: 1.8},
      { name: 'Jupiter', orbit: 295, radius: 18, speed: 1.31,  color: '#c88b3a', glow: '#e8a84e', tilt: 1.3},
      { name: 'Saturn',  orbit: 370, radius: 14, speed: 0.97,  color: '#e4d191', glow: '#f0e0a0', tilt: 2.5, rings: true },
      { name: 'Uranus',  orbit: 430, radius: 10, speed: 0.68,  color: '#7de8e8', glow: '#a0f0f0', tilt: 0.8},
      { name: 'Neptune', orbit: 480, radius: 9,  speed: 0.54,  color: '#3f54ba', glow: '#6070e0', tilt: 1.8},
    ];

    // init angles
    planets.forEach((p, i) => {
      p.angle = (i / planets.length) * Math.PI * 2;
      p.orbitR = p.orbit * scale;
      p.r = p.radius * scale;
    });

    // ── Sun ────────────────────────────────────────────────
    function drawSun(t) {
      const sunR = 34 * scale;
      // outer corona pulse
      const pulse = 1 + 0.06 * Math.sin(t * 0.002);
      for (let i = 5; i >= 1; i--) {
        const g = ctx.createRadialGradient(cx, cy, sunR * 0.5, cx, cy, sunR * i * pulse);
        g.addColorStop(0, `rgba(255,220,50,${0.06 / i})`);
        g.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.beginPath();
        ctx.arc(cx, cy, sunR * i * pulse, 0, Math.PI * 2);
        ctx.fillStyle = g;
        ctx.fill();
      }
      // core
      const core = ctx.createRadialGradient(cx - sunR * 0.3, cy - sunR * 0.3, 2, cx, cy, sunR);
      core.addColorStop(0, '#fff9c4');
      core.addColorStop(0.3, '#ffe033');
      core.addColorStop(0.7, '#ff8800');
      core.addColorStop(1, '#cc3300');
      ctx.beginPath();
      ctx.arc(cx, cy, sunR, 0, Math.PI * 2);
      ctx.fillStyle = core;
      ctx.fill();
    }

    // ── Orbit rings ────────────────────────────────────────
    function drawOrbits() {
      planets.forEach(p => {
        ctx.beginPath();
        ctx.ellipse(cx, cy, p.orbitR, p.orbitR * 0.28, 0, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(255,255,255,0.07)';
        ctx.lineWidth = 0.8;
        ctx.stroke();
      });
    }

    // ── Saturn rings ───────────────────────────────────────
    function drawRings(x, y, r) {
      ctx.save();
      ctx.translate(x, y);
      ctx.scale(1, 0.28);
      for (let i = 0; i < 3; i++) {
        ctx.beginPath();
        ctx.arc(0, 0, r * (1.6 + i * 0.28), 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(210,195,130,${0.55 - i * 0.12})`;
        ctx.lineWidth = r * 0.18;
        ctx.stroke();
      }
      ctx.restore();
    }

    // ── Planet ─────────────────────────────────────────────
    function drawPlanet(p) {
      const x = cx + Math.cos(p.angle) * p.orbitR;
      const y = cy + Math.sin(p.angle) * p.orbitR * 0.28;

      if (p.rings) drawRings(x, y, p.r);

      // glow
      const g = ctx.createRadialGradient(x, y, 0, x, y, p.r * 3.5);
      g.addColorStop(0, p.glow + 'aa');
      g.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.beginPath();
      ctx.arc(x, y, p.r * 3.5, 0, Math.PI * 2);
      ctx.fillStyle = g;
      ctx.fill();

      // sphere
      const sphere = ctx.createRadialGradient(x - p.r * 0.35, y - p.r * 0.35, p.r * 0.1, x, y, p.r);
      sphere.addColorStop(0, lighten(p.color, 60));
      sphere.addColorStop(0.5, p.color);
      sphere.addColorStop(1, darken(p.color, 60));
      ctx.beginPath();
      ctx.arc(x, y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = sphere;
      ctx.fill();

      // label
      ctx.fillStyle = 'rgba(255,255,255,0.65)';
      ctx.font = `${Math.max(9, 10 * scale)}px Courier New`;
      ctx.textAlign = 'center';
      ctx.fillText(p.name, x, y + p.r + 14 * scale);
    }

    // ── Color helpers ──────────────────────────────────────
    function hexToRgb(hex) {
      const r = parseInt(hex.slice(1,3),16);
      const g = parseInt(hex.slice(3,5),16);
      const b = parseInt(hex.slice(5,7),16);
      return [r,g,b];
    }
    function lighten(hex, amt) {
      const [r,g,b] = hexToRgb(hex);
      return `rgb(${Math.min(255,r+amt)},${Math.min(255,g+amt)},${Math.min(255,b+amt)})`;
    }
    function darken(hex, amt) {
      const [r,g,b] = hexToRgb(hex);
      return `rgb(${Math.max(0,r-amt)},${Math.max(0,g-amt)},${Math.max(0,b-amt)})`;
    }

    // ── Stars draw ─────────────────────────────────────────
    function drawStars(t) {
      stars.forEach(s => {
        s.a += s.da;
        if (s.a > 1) { s.a = 1; s.da *= -1; }
        if (s.a < 0.1) { s.a = 0.1; s.da *= -1; }
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${s.a})`;
        ctx.fill();
      });
    }

    // ── Shooting star ──────────────────────────────────────
    let shooters = [];
    function maybeShoot(t) {
      if (Math.random() < 0.004) {
        shooters.push({ x: Math.random() * W, y: Math.random() * H * 0.5, len: 120 + Math.random() * 80, life: 1 });
      }
      shooters = shooters.filter(s => s.life > 0);
      shooters.forEach(s => {
        ctx.save();
        ctx.globalAlpha = s.life;
        const grad = ctx.createLinearGradient(s.x, s.y, s.x + s.len, s.y + s.len * 0.4);
        grad.addColorStop(0, 'rgba(255,255,255,0)');
        grad.addColorStop(1, 'rgba(255,255,255,0.9)');
        ctx.beginPath();
        ctx.moveTo(s.x, s.y);
        ctx.lineTo(s.x + s.len, s.y + s.len * 0.4);
        ctx.strokeStyle = grad;
        ctx.lineWidth = 1.5;
        ctx.stroke();
        ctx.restore();
        s.x += 4; s.y += 1.5; s.life -= 0.03;
      });
    }

    // ── Main loop ──────────────────────────────────────────
    let last = 0;
    function loop(t) {
      const dt = t - last; last = t;

      ctx.clearRect(0, 0, W, H);

      // deep space gradient bg
      const bg = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.max(W,H));
      bg.addColorStop(0, '#0a0a1a');
      bg.addColorStop(0.5, '#050510');
      bg.addColorStop(1, '#000000');
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, W, H);

      drawStars(t);
      maybeShoot(t);
      drawOrbits();
      drawSun(t);

      // sort by y so closer planets draw on top
      const sorted = [...planets].sort((a, b) => {
        const ya = cy + Math.sin(a.angle) * a.orbitR * 0.28;
        const yb = cy + Math.sin(b.angle) * b.orbitR * 0.28;
        return ya - yb;
      });

      sorted.forEach(p => {
        p.angle += (p.speed / p.orbitR) * (dt * 0.012);
        drawPlanet(p);
      });

      requestAnimationFrame(loop);
    }

    requestAnimationFrame(loop);
  </script>
</body>
</html>
